<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>FortiGate Backup Portal wordt bijgewerkt</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f8fa;
        --panel: #ffffff;
        --text: #111827;
        --muted: #5b6472;
        --border: #d7dce3;
        --accent: #c2410c;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1018;
          --panel: #111827;
          --text: #f8fafc;
          --muted: #a7b0bf;
          --border: #273244;
          --accent: #fb923c;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 560px);
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        padding: 32px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.16);
      }

      .label {
        margin: 0;
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
      }

      h1 {
        margin: 12px 0 0;
        font-size: clamp(28px, 5vw, 40px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      p {
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.65;
      }

      .bar {
        height: 8px;
        margin-top: 28px;
        overflow: hidden;
        border-radius: 999px;
        background: color-mix(in srgb, var(--muted) 18%, transparent);
      }

      .bar span {
        display: block;
        width: 48%;
        height: 100%;
        border-radius: inherit;
        background: var(--accent);
        animation: pulse 1.4s ease-in-out infinite alternate;
      }

      @keyframes pulse {
        from {
          opacity: 0.55;
          transform: translateX(0);
        }

        to {
          opacity: 1;
          transform: translateX(110%);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="label">FortiGate Backup Portal</p>
      <h1>De portal wordt bijgewerkt</h1>
      <p>
        De interface is tijdelijk niet bereikbaar omdat de applicatie opnieuw start. Probeer het over enkele minuten opnieuw.
      </p>
      <div class="bar" aria-hidden="true"><span></span></div>
    </main>
  </body>
</html>
