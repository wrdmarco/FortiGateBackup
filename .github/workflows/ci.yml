name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-24.04
    env:
      DATABASE_URL: "file:../data/ci.db"
      NEXTAUTH_SECRET: "ci-secret-ci-secret-ci-secret-ci-secret"
      ENCRYPTION_KEY: "ci-encryption-key-ci-encryption-key-32"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: APP/pnpm-lock.yaml
      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
      - run: pnpm install --frozen-lockfile
        working-directory: APP
      - run: pnpm prisma generate
        working-directory: APP
      - run: pnpm run build
        working-directory: APP
